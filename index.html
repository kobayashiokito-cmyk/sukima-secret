<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>裏スキマ | SECRET ROUTE</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
    }

    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: #ffffff;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 40%, rgba(70, 70, 70, 0.12) 0%, rgba(20, 20, 20, 0.2) 25%, rgba(0,0,0,1) 65%),
        linear-gradient(180deg, #070707 0%, #000 100%);
      letter-spacing: 0.05em;
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.04) 0px,
          rgba(255,255,255,0.04) 1px,
          transparent 1px,
          transparent 3px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.03) 0px,
          rgba(255,255,255,0.03) 1px,
          transparent 1px,
          transparent 4px
        );
      mix-blend-mode: screen;
      animation: grainMove 10s linear infinite;
      z-index: 1;
    }

    @keyframes grainMove {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-1%, 1%); }
      50% { transform: translate(1%, -1%); }
      75% { transform: translate(1%, 1%); }
      100% { transform: translate(0, 0); }
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.25) 65%, rgba(0,0,0,0.72) 100%);
      z-index: 2;
    }

    .wrap {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .stage {
      width: 100%;
      max-width: 980px;
      min-height: 640px;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        linear-gradient(180deg, rgba(15,15,15,0.88), rgba(5,5,5,0.94)),
        radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 45%);
      box-shadow:
        0 0 80px rgba(0,0,0,0.9),
        inset 0 0 40px rgba(255,255,255,0.03);
    }

    .ambient-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      opacity: 0.4;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 6; /* 扉より前面に表示する */
      min-height: 640px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
    }

    .front {
      width: 100%;
      max-width: 560px;
      text-align: center;
      transition: opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease;
      padding: 26px 20px;
      border-radius: 20px;
      background: radial-gradient(circle at top, rgba(0,0,0,0.9), rgba(0,0,0,0.98));
      box-shadow:
        0 18px 40px rgba(0,0,0,0.9),
        inset 0 0 24px rgba(255,255,255,0.02);
      position: relative;
      z-index: 7; /* 扉より前面に表示 */
      color: #ffffff;
    }

    .front * {
      color: #ffffff !important;
    }

    .micro {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.34em;
      color: #ffffff;
      margin-bottom: 18px;
    }

    .title {
      font-size: clamp(30px, 5vw, 58px);
      margin: 0 0 14px;
      font-weight: 700;
      line-height: 1.1;
      color: #ffffff;
    }

    .lead {
      margin: 0 auto 24px;
      max-width: 420px;
      font-size: 14px;
      line-height: 1.9;
      color: #ffffff;
    }

    .counter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      color: #ffffff;
      font-size: 13px;
      box-shadow: inset 0 0 12px rgba(255,255,255,0.03);
    }

    .counter strong {
      font-size: 18px;
      color: #ffffff;
      min-width: 2ch;
      display: inline-block;
      text-align: right;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d9d9d9;
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
      animation: blink 1.8s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    input {
      width: 100%;
      max-width: 340px;
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
      box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
    }

    input:focus {
      border-color: rgba(255,255,255,0.28);
      box-shadow:
        0 0 0 4px rgba(255,255,255,0.04),
        inset 0 0 20px rgba(255,255,255,0.03);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: #8f8f8f;
    }

    .btn {
      padding: 14px 26px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.04));
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 14px 28px rgba(0,0,0,0.42);
    }

    .btn:active {
      transform: translateY(0);
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #ffffff;
    }

    .error {
      margin-top: 12px;
      min-height: 22px;
      font-size: 13px;
      color: #ff9f9f;
      letter-spacing: 0.08em;
    }

    .secret {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
      opacity: 0;
      transform: scale(0.98);
      transition: opacity 1s ease 0.7s, transform 1s ease 0.7s;
      pointer-events: none;
    }

    .secret-card {
      width: 100%;
      max-width: 760px;
      border-radius: 24px;
      padding: 34px 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        0 18px 50px rgba(0,0,0,0.5),
        inset 0 0 20px rgba(255,255,255,0.03);
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .secret-top {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.34em;
      color: #ffffff;
      margin-bottom: 14px;
    }

    .secret h2 {
      margin: 0 0 14px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.15;
    }

    .secret p {
      margin: 0 auto 24px;
      max-width: 520px;
      font-size: 15px;
      line-height: 1.9;
      color: #ffffff;
    }

    .items {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .item {
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      color: #ffffff;
      font-size: 15px;
      line-height: 1.6;
    }

    .note {
      margin-top: 22px;
      font-size: 12px;
      color: #ffffff;
    }

    .doors {
      position: absolute;
      inset: 0;
      z-index: 3; /* コンテンツより背面に配置 */
      pointer-events: none;
    }

    .door {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      background:
        linear-gradient(180deg, rgba(20,20,20,0.75), rgba(3,3,3,0.85)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.025) 0px,
          rgba(255,255,255,0.025) 2px,
          transparent 2px,
          transparent 18px
        );
      box-shadow:
        inset 0 0 40px rgba(255,255,255,0.02),
        0 0 30px rgba(0,0,0,0.4);
      transition: transform 1.6s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.7s ease;
    }

    .door.left {
      left: 0;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .door.right {
      right: 0;
      border-left: 1px solid rgba(255,255,255,0.08);
    }

    .door:before {
      content: "";
      position: absolute;
      top: 50%;
      width: 12px;
      height: 62px;
      margin-top: -31px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      box-shadow: 0 0 12px rgba(255,255,255,0.08);
    }

    .door.left:before {
      right: 18px;
    }

    .door.right:before {
      left: 18px;
    }

    .crack-light {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.8), transparent);
      box-shadow: 0 0 18px rgba(255,255,255,0.2);
      z-index: 6;
      opacity: 0.22;
      transition: opacity 0.6s ease, width 1.2s ease;
    }

    .flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.16), transparent 55%);
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    .opened .door.left {
      transform: translateX(-100%);
      opacity: 0;
    }

    .opened .door.right {
      transform: translateX(100%);
      opacity: 0;
    }

    .opened .crack-light {
      width: 22%;
      opacity: 0;
    }

    .opened .flash {
      opacity: 1;
    }

    .opened .front {
      opacity: 0;
      transform: scale(0.96);
      filter: blur(4px);
    }

    .opened .secret {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .shake {
      animation: shake 0.28s linear 1;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .wrap {
        padding: 10px;
      }

      .stage {
        min-height: 100vh;
        border-radius: 0;
      }

      .content {
        min-height: 100vh;
        padding: 24px 14px;
      }

      .front {
        padding: 20px 14px;
      }

      .secret-card {
        padding: 24px 16px;
      }

      .lead {
        font-size: 13px;
      }

      .counter {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="wrap">
    <div class="stage" id="stage">
      <div class="ambient-line"></div>
      <div class="flash"></div>

      <div class="content">
        <div class="front">
          <div class="micro">secret route</div>
          <h1 class="title">よくたどり着いたな</h1>
          <p class="lead">
            表には出していない、スキマの裏口。<br>
            合言葉を知る人だけ、その先へ進める。
          </p>

          <div class="counter">
            <span class="dot"></span>
            このページを見つけた人　現在<strong id="visitorCount">43</strong>人
          </div>

          <div class="form">
            <input
              id="passwordInput"
              type="text"
              placeholder="合言葉を入力"
              autocomplete="off"
            />
            <button class="btn" id="openBtn">扉をひらく</button>
          </div>

          <div class="error" id="errorMessage"></div>
          <div class="hint">合言葉：「裏スキマ」</div>
        </div>

        <div class="secret">
          <div class="secret-card">
            <div class="secret-top">welcome to the hidden side</div>
            <h2>裏スキマへ、ようこそ。</h2>
            <p>
              ここに来たあなたは、少しだけ奥側を知ってしまった人。<br>
              特典、予告、気まぐれな企画。表では言わないことを、ここにだけ置いていきます。
            </p>

            <div class="items">
              <div class="item">🎁 この画面を見せると、対象商品 10% OFF</div>
              <div class="item">🕯 次回の秘密イベント：夜のスキマ市</div>
              <div class="item">🗝 この場所は気まぐれに更新されます。時々、のぞいてみてください。</div>
            </div>

            <div class="note">
              見つけたことは、少しだけ秘密で。
            </div>
          </div>
        </div>
      </div>

      <div class="doors">
        <div class="door left"></div>
        <div class="door right"></div>
        <div class="crack-light"></div>
      </div>
    </div>
  </div>

  <script>
    const correctPassword = "裏スキマ";
    const visitorCount = document.getElementById("visitorCount");
    const passwordInput = document.getElementById("passwordInput");
    const openBtn = document.getElementById("openBtn");
    const stage = document.getElementById("stage");
    const errorMessage = document.getElementById("errorMessage");

    // まずは固定表示。数字を変えたい時はここだけ変えればOK
    visitorCount.textContent = "43";

    function tryOpenDoor() {
      const entered = passwordInput.value.trim();

      if (entered === correctPassword) {
        errorMessage.textContent = "";
        stage.classList.add("opened");
      } else {
        errorMessage.textContent = "……その言葉では、まだ開かない。";
        passwordInput.classList.remove("shake");
        void passwordInput.offsetWidth;
        passwordInput.classList.add("shake");
      }
    }

    openBtn.addEventListener("click", tryOpenDoor);

    passwordInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        tryOpenDoor();
      }
    });
  </script>
</body>
</html>
